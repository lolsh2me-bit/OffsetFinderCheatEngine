name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --console --name FoxPointerScanner direct_pointer_candidate_scanner.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: FoxPointerScanner-Windows-x64
          path: dist/FoxPointerScanner.exe
