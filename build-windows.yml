name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pyinstaller
      - run: pyinstaller --noconfirm --clean --onefile --console --name FoxOffsetFinder fox_offset_finder.py
      - uses: actions/upload-artifact@v4
        with:
          name: FoxOffsetFinder-Windows
          path: dist/FoxOffsetFinder.exe
